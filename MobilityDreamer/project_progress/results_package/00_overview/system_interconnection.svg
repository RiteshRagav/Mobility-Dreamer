<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <style>
    .box { fill:#f5f8ff; stroke:#1f3a8a; stroke-width:2; rx:10; ry:10; }
    .title { font: 700 20px Arial, sans-serif; fill:#0f172a; }
    .txt { font: 14px Arial, sans-serif; fill:#111827; }
    .link { font: 13px Arial, sans-serif; fill:#1d4ed8; }
    .arrow { stroke:#334155; stroke-width:2; marker-end:url(#arr); fill:none; }
  </style>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
  </defs>

  <text x="30" y="35" class="title">MobilityDreamer Results Interconnection Map</text>

  <rect class="box" x="40" y="80" width="210" height="110"/>
  <text x="55" y="110" class="txt">1) Core Diagrams</text>
  <text x="55" y="132" class="txt">- architecture.png</text>
  <text x="55" y="154" class="txt">- ui_architecture.png</text>
  <text x="55" y="176" class="link">01_diagrams</text>

  <rect class="box" x="300" y="80" width="250" height="110"/>
  <text x="315" y="110" class="txt">2) Generated Outputs</text>
  <text x="315" y="132" class="txt">- baseline frames</text>
  <text x="315" y="154" class="txt">- controlnet variants</text>
  <text x="315" y="176" class="link">04_evidence + results_snapshot</text>

  <rect class="box" x="610" y="80" width="230" height="110"/>
  <text x="625" y="110" class="txt">3) Structural Evidence</text>
  <text x="625" y="132" class="txt">- depth maps</text>
  <text x="625" y="154" class="txt">- refined masks</text>
  <text x="625" y="176" class="link">04_evidence</text>

  <rect class="box" x="890" y="80" width="250" height="110"/>
  <text x="905" y="110" class="txt">4) Quantitative Summary</text>
  <text x="905" y="132" class="txt">- artifact counts</text>
  <text x="905" y="154" class="txt">- generation settings</text>
  <text x="905" y="176" class="link">02_graphs + 03_tables</text>

  <rect class="box" x="390" y="280" width="430" height="140"/>
  <text x="410" y="315" class="txt">Integrated Interpretation</text>
  <text x="410" y="340" class="txt">Findings are explained jointly by design diagrams, output images,</text>
  <text x="410" y="362" class="txt">supporting structural maps, and inventory tables.</text>
  <text x="410" y="390" class="link">RESULTS_OVERVIEW.md + key_results_table.md</text>

  <rect class="box" x="390" y="470" width="430" height="100"/>
  <text x="410" y="505" class="txt">IEEE-aligned Progress Trace</text>
  <text x="410" y="528" class="txt">Recovered docs and tracking logs provide historical continuity.</text>
  <text x="410" y="550" class="link">05_supporting_docs</text>

  <path class="arrow" d="M250 135 L300 135"/>
  <path class="arrow" d="M550 135 L610 135"/>
  <path class="arrow" d="M840 135 L890 135"/>

  <path class="arrow" d="M145 190 L450 280"/>
  <path class="arrow" d="M425 190 L530 280"/>
  <path class="arrow" d="M725 190 L670 280"/>
  <path class="arrow" d="M1015 190 L760 280"/>

  <path class="arrow" d="M605 420 L605 470"/>
</svg>
